name: poem-rotator
region: nyc
services:
  - name: web
    github:
      repo: RebuildrApp/poem-rotator
      branch: main
      deploy_on_push: true
    build_command: npm install
    run_command: node server.js
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        # Set via DigitalOcean dashboard or doctl — do not commit credentials
        type: SECRET
